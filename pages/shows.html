<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SEO -->
    <meta name="description" content="Incancelables - Shows">
    <meta name="keywords" content="Musica, en vivo, online, rock, cancion, contacto">
    <meta name="robots" content="index, follow, shows">
    <!-- Insert your favicon here -->
    <title>Incancelables - Shows</title>
    <link rel="icon" type="image/x-icon" href="../assets/irrobafav.svg">
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/shows.css">
</head>

<body>
    <div class="layout">
        <!-- ====================================================== 
                                HEADER 
        ======================================================= -->
        <header class="header">
            <!-- Header reemplazado por components/header.html -->
        </header>
        <!-- ====================================================== 
                                MAIN 
        ======================================================= -->
        <main class="main">
            <!-- ====================================================== 
                                    PRÓXIMO SHOW 
            ======================================================= -->
            <section class="proximo-show">
                <!-- CABECERA DEL SHOW -->
                <header>
                    <span class="show-badge">● PRÓXIMO SHOW</span>
                    <h1 id="upcoming-show-title">placeholder</h1>
                </header>
                <!-- FLYER DEL SHOW -->
                <picture class="show-flyer">
                    <source id="upcoming-show-desktop" media="(min-width:768px)" srcset="placeholder" type="image/png">
                    <img id="upcoming-show-mobile" src="placeholder" alt="Flyer del próximo show">
                </picture>
                <!-- INFORMACIÓN DEL SHOW -->
                <article class="show-info">
                    <h2 class="visually-hidden">Show Info</h2>
                    <p id="upcoming-show-date" class="show-fecha"></p>
                    <p id="upcoming-show-location" class="show-lugar"></p>
                </article>
                <!-- ACCIONES -->
                <div class="acciones">
                    <a class="btn" href="#">Entradas</a>
                    <a class="btn-secundario" href="#">Agregar al calendario</a>
                </div>
            </section>
            <!-- ====================================================== 
                                HISTORIAL DE SHOWS 
            ======================================================= -->
            <section class="historial">
                <h2>Shows anteriores</h2>
                <!-- cardato dinamicamente por shows.js desde data/showsHistoricos.js -->
                <div id="shows-history"></div>
            </section>
        </main>
        <!-- ====================================================== 
                                 ASIDE 
        ======================================================= -->
        <aside class="aside">
            <h2>Que no se corte...</h2>
            <!-- BOTÓN DE CONTACTO -->
            <a href="../pages/contacto.html" class="btn">
                Seguinos
            </a>
        </aside>
        <!-- ====================================================== 
                                FOOTER 
        ======================================================= -->
        <footer class="footer">
            <!-- footer reemplazado por components/footer.html -->
        </footer>
        <!-- SCRIPTS -->
        <script src="../scripts/components.js"></script>
        <script src="../scripts/main.js"></script>
        <script type="module" src="../scripts/shows.js"></script>
    </div>
</body>
